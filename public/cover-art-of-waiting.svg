<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c5a035"/>
      <stop offset="100%" stop-color="#e8c84a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 唱片 -->
  <circle cx="400" cy="315" r="200" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="400" cy="315" r="180" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="400" cy="315" r="165" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="400" cy="315" r="150" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="400" cy="315" r="135" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="400" cy="315" r="120" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="400" cy="315" r="105" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="400" cy="315" r="90" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="400" cy="315" r="75" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="400" cy="315" r="60" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <!-- 标签 -->
  <circle cx="400" cy="315" r="50" fill="#f5e6cc" opacity="0.85"/>
  
  <!-- 沙漏 -->
  <g transform="translate(400, 315)" stroke="#8B6914" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="-22" y1="-28" x2="22" y2="-28"/>
    <line x1="-22" y1="28" x2="22" y2="28"/>
    <line x1="-22" y1="-28" x2="22" y2="28"/>
    <line x1="22" y1="-28" x2="-22" y2="28"/>
    <line x1="-8" y1="-8" x2="8" y2="-8"/>
    <line x1="-8" y1="8" x2="8" y2="8"/>
    <!-- 沙子 -->
    <line x1="-3" y1="-6" x2="3" y2="-6" stroke="#e8c84a" stroke-width="1.5"/>
    <line x1="-2" y1="2" x2="2" y2="2" stroke="#e8c84a" stroke-width="1.5"/>
    <line x1="-1" y1="6" x2="1" y2="6" stroke="#e8c84a" stroke-width="1.5"/>
  </g>

  <!-- 标题 -->
  <text x="800" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="56" fill="#e8c84a" font-weight="bold" letter-spacing="6">等待的艺术</text>
  <text x="800" y="350" text-anchor="middle" font-family="KaiTi, serif" font-size="22" fill="#888" letter-spacing="4">慢不是问题，无聊才是</text>
</svg>

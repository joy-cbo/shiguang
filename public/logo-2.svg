<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="ls1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
  </defs>
  <!-- 简约几何光柱 -->
  <rect x="30" y="25" width="6" height="55" rx="3" fill="url(#ls1)" opacity="0.9"/>
  <rect x="42" y="15" width="6" height="65" rx="3" fill="url(#ls1)" opacity="0.7"/>
  <rect x="54" y="20" width="6" height="60" rx="3" fill="url(#ls1)" opacity="0.8"/>
  <rect x="66" y="10" width="6" height="70" rx="3" fill="url(#ls1)" opacity="0.6"/>
  <rect x="78" y="25" width="6" height="55" rx="3" fill="url(#ls1)" opacity="0.9"/>
  <rect x="90" y="35" width="6" height="45" rx="3" fill="url(#ls1)" opacity="0.5"/>
  <!-- 光点 -->
  <circle cx="45" cy="14" r="3" fill="#FCD34D"/>
  <circle cx="69" cy="9" r="3" fill="#FCD34D"/>
  <circle cx="81" cy="24" r="2" fill="#FDE68A"/>
  <!-- 文字 -->
  <text x="140" y="72" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="52" font-weight="700" fill="#1F2937" letter-spacing="4">拾光</text>
  <text x="140" y="98" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="14" fill="#9CA3AF" letter-spacing="6">PICKING UP LIGHT</text>
</svg>
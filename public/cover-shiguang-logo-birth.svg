<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c5a035"/>
      <stop offset="100%" stop-color="#e8c84a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 唱片 -->
  <circle cx="380" cy="315" r="180" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="380" cy="315" r="160" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="380" cy="315" r="145" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="380" cy="315" r="130" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="380" cy="315" r="115" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <circle cx="380" cy="315" r="100" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <!-- 标签 -->
  <circle cx="380" cy="315" r="55" fill="#f5e6cc" opacity="0.9"/>

  <!-- 笔记本 -->
  <g transform="translate(720, 315)">
    <path d="M-140,-90 L0,-80 L140,-90 L140,70 L0,80 L-140,70 Z" fill="none" stroke="#c5a035" stroke-width="2.5"/>
    <path d="M0,-80 L0,80" stroke="#b8960f" stroke-width="1.5"/>
    <line x1="-130" y1="-50" x2="-10" y2="-45" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
    <line x1="-130" y1="-20" x2="-10" y2="-15" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
    <line x1="-130" y1="10" x2="-10" y2="15" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
    <line x1="-130" y1="40" x2="-10" y2="45" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="-45" x2="130" y2="-50" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="-15" x2="130" y2="-20" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="15" x2="130" y2="10" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="45" x2="130" y2="40" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- 标题 -->
  <text x="600" y="560" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#e8c84a" font-weight="bold" letter-spacing="6">拾光 Logo 诞生记</text>
  <text x="600" y="595" text-anchor="middle" font-family="KaiTi, serif" font-size="20" fill="#888" letter-spacing="3">从一个想法到接近满意的样子</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380" width="400" height="380">
  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .spinning { animation: spin 3s linear infinite; transform-origin: 200px 150px; }
    .pulsing { animation: pulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- ===== 笔记本（静态底部） ===== -->
  <g transform="translate(200, 255)">
    <ellipse cx="0" cy="75" rx="155" ry="10" fill="#C4A35A" opacity="0.12"/>
    <path d="M -155,-40 L -155,70 Q -155,78 -148,78 L 0,85 L 148,78 Q 155,78 155,70 L 155,-40 Z" fill="#FDF5E6" opacity="0.3"/>
    <line x1="0" y1="-38" x2="0" y2="82" stroke="#B8960F" stroke-width="1.5"/>
    <path d="M -150,-38 L -150,68 Q -150,74 -143,74 L 0,80 L 0,-38 Z" fill="none" stroke="#C5A035" stroke-width="2"/>
    <path d="M -145,-35 L -145,65 Q -145,70 -139,70 L -3,76 L -3,-35 Z" fill="#FDF8F0" stroke="#C5A035" stroke-width="1"/>
    <line x1="-135" y1="-18" x2="-10" y2="-20" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <line x1="-135" y1="-2" x2="-10" y2="-4" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <line x1="-135" y1="14" x2="-10" y2="12" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <line x1="-135" y1="30" x2="-10" y2="28" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <line x1="-135" y1="46" x2="-10" y2="44" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <line x1="-135" y1="62" x2="-10" y2="60" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <path d="M 0,-38 L 0,80 L 143,74 Q 150,74 150,68 L 150,-38 Z" fill="none" stroke="#C5A035" stroke-width="2"/>
    <path d="M 3,-35 L 3,76 L 139,70 Q 145,70 145,65 L 145,-35 Z" fill="#FDF8F0" stroke="#C5A035" stroke-width="1"/>
    <line x1="10" y1="-20" x2="135" y2="-18" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="-4" x2="135" y2="-2" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="12" x2="135" y2="14" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="28" x2="135" y2="30" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="44" x2="135" y2="46" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="60" x2="135" y2="62" stroke="#D4B896" stroke-width="0.5" opacity="0.5"/>
    <text x="20" y="8" font-family="Georgia, serif" font-size="13" fill="#8B6914" opacity="0.6" font-style="italic" letter-spacing="2">shiguang</text>
    <path d="M 0,78 C -8,95 -5,110 0,115" fill="none" stroke="#C5A035" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- ===== 唱片（旋转） ===== -->
  <g class="spinning">
    <!-- 唱片主体 -->
    <circle cx="200" cy="150" r="78" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
    <circle cx="200" cy="150" r="72" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="200" cy="150" r="67" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="200" cy="150" r="63" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="200" cy="150" r="59" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="200" cy="150" r="55" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="200" cy="150" r="51" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="200" cy="150" r="47" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="200" cy="150" r="43" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="200" cy="150" r="39" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="200" cy="150" r="35" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <!-- 高光 -->
    <ellipse cx="180" cy="120" rx="40" ry="20" fill="#333" opacity="0.15" transform="rotate(-30, 180, 120)"/>
    <!-- 标签 -->
    <circle cx="200" cy="150" r="24" fill="#F5E6CC" stroke="#C4A35A" stroke-width="1"/>
    <text x="200" y="155" text-anchor="middle" font-family="KaiTi, serif" font-size="11" fill="#6B4C1E" font-weight="bold" letter-spacing="1">拾光</text>
    <line x1="184" y1="144" x2="216" y2="144" stroke="#C4A35A" stroke-width="0.5" opacity="0.6"/>
    <!-- 中心孔 -->
    <circle cx="200" cy="150" r="3.5" fill="#000"/>
    <path d="M 145,95 A 78,78 0 0,1 170,78" fill="none" stroke="#444" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- ===== 拨杆（右上底座，针尖落在唱片中右侧表面） ===== -->
  <g>
    <rect x="270" y="54" width="14" height="28" rx="2" fill="#888" stroke="#999" stroke-width="1"/>
    <circle cx="277" cy="68" r="6" fill="#888" stroke="#999" stroke-width="1"/>
    <!-- 臂杆：从右上清晰跨过唱片，针尖落在唱片中右 -->
    <path d="M 277,68 Q 255,105 258,148 L 254,150" fill="none" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 唱头壳 -->
    <rect x="248" y="143" width="12" height="7" rx="3" fill="#C0C0C0" stroke="#999" stroke-width="0.5" transform="rotate(-12, 254, 146)"/>
    <!-- 唱针 -->
    <line x1="254" y1="150" x2="257" y2="158" stroke="#999" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- ===== 底部文字 ===== -->
  <text x="200" y="370" text-anchor="middle" font-family="Georgia, KaiTi, serif" font-size="24" fill="#8B7355" opacity="0.7" letter-spacing="6" class="pulsing">正在拾光...</text>
</svg>

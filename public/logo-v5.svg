<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" width="400" height="360">
  <defs>
    <style>
      .rec-body { fill: #1A1A1A; stroke: #333; stroke-width: 1.5; }
      .rec-groove { fill: none; stroke: #2A2A2A; stroke-width: 0.6; }
      .rec-label { fill: #F5E6CC; stroke: #C4A35A; stroke-width: 1; }
      .rec-hole { fill: #000; }
      .rec-shine { fill: none; stroke: #444; stroke-width: 0.5; opacity: 0.4; }
      .tonearm { fill: none; stroke: #C0C0C0; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .tonearm-base { fill: #888; stroke: #999; stroke-width: 1; }
      .tonearm-head { fill: #C0C0C0; stroke: #999; stroke-width: 0.5; }
      .nb-cover { fill: none; stroke: #C5A035; stroke-width: 2; stroke-linejoin: round; }
      .nb-spine { fill: none; stroke: #B8960F; stroke-width: 1.5; }
      .nb-page { fill: #FDF8F0; stroke: #C5A035; stroke-width: 1; }
      .nb-rule { fill: none; stroke: #D4B896; stroke-width: 0.5; opacity: 0.5; stroke-linecap: round; }
      .nb-text { fill: none; stroke: #C4A35A; stroke-width: 0.4; opacity: 0.3; stroke-linecap: round; }
    </style>
  </defs>

  <!-- ===== 笔记本 ===== -->
  <g transform="translate(200, 255)">
    <ellipse cx="0" cy="75" rx="155" ry="10" fill="#C4A35A" opacity="0.12"/>
    <path d="M -155,-40 L -155,70 Q -155,78 -148,78 L 0,85 L 148,78 Q 155,78 155,70 L 155,-40 Z" fill="#FDF5E6" opacity="0.3"/>
    <line x1="0" y1="-38" x2="0" y2="82" class="nb-spine"/>
    <path d="M -150,-38 L -150,68 Q -150,74 -143,74 L 0,80 L 0,-38 Z" class="nb-cover"/>
    <path d="M -145,-35 L -145,65 Q -145,70 -139,70 L -3,76 L -3,-35 Z" class="nb-page"/>
    <line x1="-135" y1="-18" x2="-10" y2="-20" class="nb-rule"/>
    <line x1="-135" y1="-2" x2="-10" y2="-4" class="nb-rule"/>
    <line x1="-135" y1="14" x2="-10" y2="12" class="nb-rule"/>
    <line x1="-135" y1="30" x2="-10" y2="28" class="nb-rule"/>
    <line x1="-135" y1="46" x2="-10" y2="44" class="nb-rule"/>
    <line x1="-135" y1="62" x2="-10" y2="60" class="nb-rule"/>
    <path d="M -120,-15 Q -110,-20 -100,-15" class="nb-text"/>
    <path d="M -125,5 Q -115,2 -105,6" class="nb-text"/>
    <path d="M 0,-38 L 0,80 L 143,74 Q 150,74 150,68 L 150,-38 Z" class="nb-cover"/>
    <path d="M 3,-35 L 3,76 L 139,70 Q 145,70 145,65 L 145,-35 Z" class="nb-page"/>
    <line x1="10" y1="-20" x2="135" y2="-18" class="nb-rule"/>
    <line x1="10" y1="-4" x2="135" y2="-2" class="nb-rule"/>
    <line x1="10" y1="12" x2="135" y2="14" class="nb-rule"/>
    <line x1="10" y1="28" x2="135" y2="30" class="nb-rule"/>
    <line x1="10" y1="44" x2="135" y2="46" class="nb-rule"/>
    <line x1="10" y1="60" x2="135" y2="62" class="nb-rule"/>
    <text x="20" y="8" font-family="Georgia, serif" font-size="13" fill="#8B6914" opacity="0.6" font-style="italic" letter-spacing="2">shiguang</text>
    <path d="M 0,78 C -8,95 -5,110 0,115" class="nb-cover" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- ===== 唱片 ===== -->
  <g transform="translate(200, 150)">
    <ellipse cx="0" cy="90" rx="68" ry="14" fill="#1A1A1A" opacity="0.15"/>
    <circle cx="0" cy="0" r="78" class="rec-body"/>
    <circle cx="0" cy="0" r="72" class="rec-groove"/>
    <circle cx="0" cy="0" r="67" class="rec-groove"/>
    <circle cx="0" cy="0" r="63" class="rec-groove"/>
    <circle cx="0" cy="0" r="59" class="rec-groove"/>
    <circle cx="0" cy="0" r="55" class="rec-groove"/>
    <circle cx="0" cy="0" r="51" class="rec-groove"/>
    <circle cx="0" cy="0" r="47" class="rec-groove"/>
    <circle cx="0" cy="0" r="43" class="rec-groove"/>
    <circle cx="0" cy="0" r="39" class="rec-groove"/>
    <circle cx="0" cy="0" r="35" class="rec-groove"/>
    <ellipse cx="-20" cy="-30" rx="40" ry="20" fill="#333" opacity="0.15" transform="rotate(-30, -20, -30)"/>
    <circle cx="0" cy="0" r="24" class="rec-label"/>
    <text x="0" y="5" text-anchor="middle" font-family="KaiTi, STKaiti, 楷体, serif" font-size="11" fill="#6B4C1E" font-weight="bold" letter-spacing="1">拾光</text>
    <line x1="-16" y1="-6" x2="16" y2="-6" stroke="#C4A35A" stroke-width="0.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="3.5" class="rec-hole"/>
    <path d="M -55,-55 A 78,78 0 0,1 -30,-72" class="rec-shine"/>
  </g>

  <!-- ===== 拨杆（右上底座，沿右侧下垂停托架，不碰唱片） ===== -->
  <g>
    <!-- 底座 -->
    <rect x="272" y="56" width="14" height="28" rx="2" class="tonearm-base"/>
    <circle cx="279" cy="70" r="6" class="tonearm-base"/>
    <!-- 托架（右下靠近唱片边缘） -->
    <rect x="273" y="186" width="8" height="10" rx="2" fill="#999" stroke="#888" stroke-width="0.5"/>
    <!-- 臂杆：从右上沿着右侧下垂到托架，不跨越唱片 -->
    <path d="M 279,70 Q 282,130 280,190" class="tonearm"/>
    <!-- 唱头壳 -->
    <rect x="274" y="182" width="10" height="6" rx="2" class="tonearm-head" transform="rotate(-10, 279, 185)"/>
    <!-- 唱针（悬空） -->
    <line x1="279" y1="188" x2="283" y2="193" stroke="#999" stroke-width="0.8" stroke-linecap="round"/>
  </g>
</svg>
